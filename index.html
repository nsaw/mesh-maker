<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESHCRAFT // Sawyer Design</title>
<link rel="icon" type="image/png" href="https://imagedelivery.net/7Un9nY7FmOV52M6-Dm1bzA/1dd2357c-f009-4b89-7e30-1d1539a9f100/w=150">
<meta name="description" content="Browser-based 3D mesh generator for CNC machining. Noise algorithms, depth map import, watertight STL/OBJ export.">
<meta property="og:title" content="MESHCRAFT">
<meta property="og:description" content="Browser-based 3D mesh generator for CNC machining. Noise algorithms, depth map import, watertight STL/OBJ export.">
<meta property="og:image" content="https://imagedelivery.net/7Un9nY7FmOV52M6-Dm1bzA/a3602ddf-a7fe-4a5c-c8c0-5aa21ba85f00/w=800">
<meta property="og:url" content="https://meshcraft.sawyerdesign.io">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="MESHCRAFT">
<meta name="twitter:description" content="Browser-based 3D mesh generator for CNC machining.">
<meta name="twitter:image" content="https://imagedelivery.net/7Un9nY7FmOV52M6-Dm1bzA/a3602ddf-a7fe-4a5c-c8c0-5aa21ba85f00/w=800">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600&family=Ubuntu:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
</head>
<body class="mode-noise">

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="brand">MESH<span>CRAFT</span> </div>
    <div class="version">v10.0</div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="noise">Noise</button>
      <button class="mode-tab" data-mode="depthmap">Depth Map</button>
      <button class="mode-tab" data-mode="blend">Blend</button>
    </div>
  </div>
  <div class="header-right">
    <a href="https://www.paypal.com/ncp/payment/X76TNFLB3Z6RL" target="_blank" rel="noopener" class="tip-btn" title="Buy me a coffee!">Buy me a coffee</a>
    <button class="btn btn-sm" id="btnSponsor" style="font-size:10px;color:var(--green);border-color:rgba(78,255,158,0.3);background:rgba(78,255,158,0.08);" title="Our sponsor">ShopBot &#9825;</button>
    <span style="font-family:'Teko',sans-serif;text-transform:uppercase;font-size:12px;color:var(--text3);letter-spacing:1px;">Sawyer Design</span>
    <img src="https://imagedelivery.net/7Un9nY7FmOV52M6-Dm1bzA/59f91699-ef0d-4c39-1cab-822e0c835300/w=200" alt="SD" class="logo" crossorigin="anonymous" onerror="this.style.display='none'"/>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar"></div>

  <!-- VIEWPORT -->
  <div class="viewport">
    <div class="viewport-toolbar">
      <div class="view-modes">
        <button type="button" class="view-btn active" data-view="solid" aria-label="Solid view">Solid</button>
        <button type="button" class="view-btn" data-view="wireframe" aria-label="Wireframe view">Wire</button>
        <button type="button" class="view-btn" data-view="both" aria-label="Solid and wireframe view">Both</button>
        <button type="button" class="view-btn" data-view="points" aria-label="Points view">Points</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn btn-sm" id="btnRegenerate">Regenerate</button>
        <button class="btn btn-sm" id="btnRandomSeed">Random Seed</button>
        <button class="btn btn-sm" id="btnZoomExtents">Zoom Extents</button>
        <button class="btn btn-sm" id="btnResetCamera">Reset View</button>
        <button class="btn btn-sm" id="btnCopyLink" title="Copy shareable link to clipboard">Copy Link</button>
      </div>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="viewport"></canvas>
      <div class="dims-overlay" id="dimsOverlay"></div>
      <div class="stats-overlay" id="statsOverlay"></div>
      <div class="generating-overlay" id="genOverlay"><div class="generating-spinner"></div></div>
    </div>
    <div class="export-bar">
      <input type="text" class="text-input filename-input" id="filenameInput" value="meshcraft_export" placeholder="filename">
      <div class="export-format">
        <button type="button" class="format-btn active" data-fmt="stl" aria-label="Export as STL">STL</button>
        <button type="button" class="format-btn" data-fmt="obj" aria-label="Export as OBJ">OBJ</button>
        <button type="button" class="format-btn" data-fmt="3dm" aria-label="Export as Rhino 3DM">3DM</button>
        <button type="button" class="format-btn" data-fmt="heightmap" aria-label="Export as heightmap PNG" title="Grayscale PNG for Vectric VCarve/Aspire">Heightmap</button>
        <button type="button" class="format-btn" data-fmt="sbp" aria-label="Export as ShopBot SBP" title="ShopBot cut file (.sbp)" data-sbp-enabled="true">SBP</button>
      </div>
      <div class="check-row" style="margin:0;">
        <input type="checkbox" id="chkWatertight" checked>
        <label for="chkWatertight">Watertight (CNC)</label>
      </div>
      <div class="check-row" style="margin:0;">
        <input type="checkbox" id="chkBinary" checked>
        <label for="chkBinary">Binary</label>
      </div>
      <div class="check-row" style="margin:0;">
        <input type="checkbox" id="chk3dmPointCloud" title="3DM: export as point cloud (vertices only, no faces)">
        <label for="chk3dmPointCloud">Point cloud (3DM)</label>
      </div>
      <button class="btn btn-accent" id="btnExport">Export</button>
    </div>
  </div>
</div>

<!-- SPONSOR MODAL -->
<div class="sponsor-backdrop" id="sponsorBackdrop">
  <div class="sponsor-modal">
    <div class="sponsor-img-wrap">
      <button class="sponsor-close" id="sponsorClose" aria-label="Close">&times;</button>
      <img id="sponsorImg" src="https://imagedelivery.net/7Un9nY7FmOV52M6-Dm1bzA/ef64f44c-42cc-451d-f1de-b51229a45600/w=800" alt="ShopBot Desktop Max ATC" />
      <button class="sponsor-img-nav prev" id="sponsorPrev">&#8249;</button>
      <button class="sponsor-img-nav next" id="sponsorNext">&#8250;</button>
    </div>
    <div class="sponsor-body">
      <div class="sponsor-label">Sponsored by</div>
      <div class="sponsor-name">ShopBot Tools</div>
      <div class="sponsor-product">Desktop Max ATC</div>
      <div class="sponsor-desc">MESHCRAFT was built for the ShopBot Desktop Max ATC &mdash; a production-grade CNC router with automatic tool changing, 36&Prime;&times;24&Prime; cutting area, and 6&Prime; Z travel.</div>
      <a href="https://shopbottools.com/products/desktop-max-atc/" target="_blank" rel="noopener" class="sponsor-cta">Learn More</a>
    </div>
  </div>
</div>

<!-- SCROLL TO EXPORT (mobile) -->
<button class="scroll-export-btn" id="scrollExportBtn" aria-label="Scroll to export">&#8595;</button>

<div class="toast" id="toast" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#fff;padding:8px 20px;border-radius:var(--radius);font-size:12px;font-weight:600;z-index:1001;pointer-events:none;"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
